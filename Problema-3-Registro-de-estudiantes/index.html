<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 3: Registro de estudiantes</title>
</head>
<body>
    <main>
        <h1>
            Registro de estudiantes
        </h1>

        <h2>
            Registrar Estudiante
        </h2>

        <form id="studentForm">
            <div>
                <label for="">Nombre:</label>
                <input type="text" id="name" placeholder="Nombre"><br><br>
                <label for="">Nota:</label>
                <input type="number" id="score" placeholder="Nota" min="0" max="5">

                <br><br>
                <input type="submit" value="Validar" id="btnValidate">
            </div>
        </form>

        <div id="result">

        </div>
    </main>

    <script type="module" src="./js/Main.js"></script>
</body>
</html>
