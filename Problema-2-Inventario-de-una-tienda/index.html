<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 2: Inventario de una tienda</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <main>
        <div>
            <h1>Sistema de invetario</h1>
        <div>

        <div>
            <h2>Registrar Nuevo Producto</h2>
        </div>
        <form id="productForm">
            <label for="name">Nombre del Producto:</label>
            <input type="text" id="name" required>
            <br><br>
            
            <label for="price">Precio ($):</label>
            <input type="number" id="price" required>
            <br><br>
            
            <label for="amount">Cantidad Disponible:</label>
            <input type="number" id="amount" min="0" required>
            <br><br>
            
            <button type="submit" id="btnRegisterProduct">Registrar Producto</button>
        </form>

        <div>
            <h2>Resultados</h2>
            <div id="result"></div>
        </div>

        <div>
            <h2>Productos en Inventario</h2>
            <input type="button" value="Consultar Productos" id="btnConsult">
            <div id="inventoryList">
                <!-- <p>No hay productos registrados</p> -->
            </div>
        </div>

        <div>
            <h2>Valor Total del Inventario</h2>
            <div id="totalValue">$0.00</div>
        </div>
    </main>

    <script type="module" src="./js/Main.js"></script>
</body>
</html>
